# Шаблон до certbot: только HTTP. После certbot правки добавятся автоматически.
server {
    listen 80;
    listen [::]:80;
    server_name lk.nmiczd.ru;

    # Верификация Яндекс.Вебмастера (Next.js 16 может отдавать 404 для .html из public — отдаём через nginx)
    location = /yandex_8d202f10c2495847.html {
        alias /var/www/lk.nmiczd.ru/public/yandex_8d202f10c2495847.html;
        default_type text/html;
        charset utf-8;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
